<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis Mark | Create Your Corporate Brand Shield Account</title>
  <meta name="description" content="Create an Aegis Mark account. Set up your corporate email to secure brand names, manage portfolios, and run deep clearance searches.">
  
  <!-- CSS Framework & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Custom Core Stylesheets -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
</head>
<body class="auth-page">

  <!-- Fixed Top-Right Theme and Layout Toggles -->
  <div class="auth-header-toggles">
    <button class="toggle-btn rtl-toggle-btn" aria-label="Switch Direction">RTL</button>
    <button class="toggle-btn theme-toggle-btn" aria-label="Switch Theme">
      <i class="bi bi-moon-fill"></i>
    </button>
  </div>

  <!-- Centered Register Card -->
  <main class="auth-card" style="max-width: 550px;">
    
    <!-- Logo Inside Card -->
    <a href="../index.html" class="auth-logo">
      <svg class="logo-icon" width="32" height="32" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="none" stroke="currentColor" stroke-width="8"/>
        <path d="M30,50 L50,30 L70,50 L50,70 Z" fill="currentColor"/>
      </svg>
      <span class="logo-text">AEGIS<span>MARK</span></span>
    </a>
    
    <h2 class="auth-title">Register Portal</h2>
    <p class="auth-subtitle">Protect your naming assets with premium legal intelligence.</p>

    <!-- Social Registration Toggles -->
    <button type="button" class="auth-social-btn">
      <i class="bi bi-google text-danger"></i> Sign Up with Google
    </button>
    <button type="button" class="auth-social-btn">
      <i class="bi bi-apple text-dark"></i> Sign Up with Apple
    </button>

    <div class="auth-separator">Or Create Portal Account</div>

    <!-- Registration Form -->
    <form class="needs-validation-premium" novalidate>
      
      <!-- Name block (stacked on mobile) -->
      <div class="row">
        <div class="col-sm-6 form-group-premium text-start">
          <label for="first-name" class="form-label-premium">First Name</label>
          <input type="text" id="first-name" class="form-control-premium" placeholder="e.g. John" required>
        </div>
        <div class="col-sm-6 form-group-premium text-start">
          <label for="last-name" class="form-label-premium">Last Name</label>
          <input type="text" id="last-name" class="form-control-premium" placeholder="e.g. Doe" required>
        </div>
      </div>

      <!-- Email input -->
      <div class="form-group-premium text-start">
        <label for="email" class="form-label-premium">Email Address</label>
        <input type="email" id="email" class="form-control-premium" placeholder="john@company.com" required>
      </div>

      <!-- Password input -->
      <div class="form-group-premium text-start">
        <label for="password" class="form-label-premium">Password</label>
        <div class="auth-input-wrapper">
          <input type="password" id="password" class="form-control-premium" placeholder="••••••••" required>
          <i class="bi bi-eye-fill password-toggle-icon" data-target="password" aria-label="Toggle password visibility"></i>
        </div>
      </div>

      <!-- Confirm Password input -->
      <div class="form-group-premium text-start">
        <label for="confirm-password" class="form-label-premium">Confirm Password</label>
        <div class="auth-input-wrapper">
          <input type="password" id="confirm-password" class="form-control-premium" placeholder="••••••••" required>
          <i class="bi bi-eye-fill password-toggle-icon" data-target="confirm-password" aria-label="Toggle password visibility"></i>
        </div>
      </div>

      <!-- Submit & Redirect link -->
      <div class="auth-btn-stack mt-4">
        <button type="submit" class="btn btn-premium btn-premium-primary w-100">Create Shield Account</button>
        <p class="mb-0 text-secondary" style="font-size: 0.95rem;">
          Already have an account? <a href="./login.html" class="text-warning fw-semibold auth-link">Sign In</a>
        </p>
      </div>

    </form>

  </main>

  <!-- Script references -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
