<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis Mark | Portal Client Sign In</title>
  <meta name="description" content="Sign in to your Aegis Mark brand protection portal. Manage your active trademark applications and review domain infringement logs.">
  
  <!-- CSS Framework & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Custom Core Stylesheets -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
</head>
<body class="auth-page">

  <!-- Fixed Top-Right Theme and Layout Toggles -->
  <div class="auth-header-toggles">
    <button class="toggle-btn rtl-toggle-btn" aria-label="Switch Direction">RTL</button>
    <button class="toggle-btn theme-toggle-btn" aria-label="Switch Theme">
      <i class="bi bi-moon-fill"></i>
    </button>
  </div>

  <!-- Centered Login Card -->
  <main class="auth-card">
    
    <!-- Logo Inside Card -->
    <a href="../index.html" class="auth-logo">
      <svg class="logo-icon" width="32" height="32" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="none" stroke="currentColor" stroke-width="8"/>
        <path d="M30,50 L50,30 L70,50 L50,70 Z" fill="currentColor"/>
      </svg>
      <span class="logo-text">AEGIS<span>MARK</span></span>
    </a>
    
    <h2 class="auth-title">Client Login</h2>
    <p class="auth-subtitle">Access your digital brand portal logs.</p>

    <!-- Social Login Actions -->
    <button type="button" class="auth-social-btn">
      <i class="bi bi-google text-danger"></i> Continue with Google
    </button>
    <button type="button" class="auth-social-btn">
      <i class="bi bi-apple text-dark"></i> Continue with Apple
    </button>

    <div class="auth-separator">Or Sign In with Email</div>

    <!-- Login Form -->
    <form class="needs-validation-premium" novalidate>
      
      <!-- Email input -->
      <div class="form-group-premium text-start">
        <label for="email" class="form-label-premium">Email Address</label>
        <input type="email" id="email" class="form-control-premium" placeholder="john@company.com" required>
      </div>

      <!-- Password input -->
      <div class="form-group-premium text-start">
        <label for="password" class="form-label-premium">Password</label>
        <div class="auth-input-wrapper">
          <input type="password" id="password" class="form-control-premium" placeholder="••••••••" required>
          <i class="bi bi-eye-fill password-toggle-icon" data-target="password" aria-label="Toggle password visibility"></i>
        </div>
      </div>

      <!-- Remember & Forgot details -->
      <div class="auth-remember-row">
        <div class="form-check d-flex align-items-center gap-2">
          <input class="form-check-input auth-checkbox" type="checkbox" id="remember-me">
          <label class="form-check-label mb-0" for="remember-me">Remember Me</label>
        </div>
        <a href="./coming-soon.html" class="text-warning fw-semibold auth-link">Forgot Password?</a>
      </div>

      <!-- Submit & Signup link -->
      <div class="auth-btn-stack">
        <button type="submit" class="btn btn-premium btn-premium-primary w-100">Sign In Portal</button>
        <p class="mb-0 text-secondary" style="font-size: 0.95rem;">
          Don't have an account? <a href="./register.html" class="text-warning fw-semibold auth-link">Sign Up</a>
        </p>
      </div>

    </form>

  </main>

  <!-- Script references -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
