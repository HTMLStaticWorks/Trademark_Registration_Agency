<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis Mark | Brand Protection Portal Launching Soon</title>
  <meta name="description" content="Aegis Mark automated monitoring and clearance portals are launching soon. Subscribe to get early access and updates.">
  
  <!-- CSS Framework & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Custom Core Stylesheets -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <style>
    .countdown-box {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-md);
      padding: 15px;
      min-width: 80px;
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
</head>
<body class="auth-page">

  <!-- Fixed Top-Right Theme and Layout Toggles -->
  <div class="auth-header-toggles">
    <button class="toggle-btn rtl-toggle-btn" aria-label="Switch Direction">RTL</button>
    <button class="toggle-btn theme-toggle-btn" aria-label="Switch Theme">
      <i class="bi bi-moon-fill"></i>
    </button>
    <a href="../index.html" class="toggle-btn" aria-label="Back to Homepage"><i class="bi bi-house-door-fill"></i></a>
  </div>

  <!-- Main Countdown Container -->
  <main class="auth-card" style="max-width: 600px;">
    
    <!-- Logo Inside Card -->
    <a href="../index.html" class="auth-logo">
      <svg class="logo-icon" width="32" height="32" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="none" stroke="currentColor" stroke-width="8"/>
        <path d="M30,50 L50,30 L70,50 L50,70 Z" fill="currentColor"/>
      </svg>
      <span class="logo-text">AEGIS<span>MARK</span></span>
    </a>
    
    <h2 class="auth-title mt-2">Brand Shield Portal</h2>
    <p class="auth-subtitle mb-4">We are preparing to deploy the real-time domain tracking and automated clearance dashboard. Sign up for early priority keys.</p>

    <!-- Countdown Timer Grid -->
    <div class="d-flex justify-content-center gap-3 mb-5" style="font-family: var(--font-headings);">
      <div class="countdown-box">
        <h3 id="timer-days" class="mb-0 text-primary fw-bold" style="font-size: 2rem;">00</h3>
        <small class="text-muted text-uppercase" style="font-size: 0.7rem; font-weight: 700;">Days</small>
      </div>
      <div class="countdown-box">
        <h3 id="timer-hours" class="mb-0 text-primary fw-bold" style="font-size: 2rem;">00</h3>
        <small class="text-muted text-uppercase" style="font-size: 0.7rem; font-weight: 700;">Hours</small>
      </div>
      <div class="countdown-box">
        <h3 id="timer-minutes" class="mb-0 text-primary fw-bold" style="font-size: 2rem;">00</h3>
        <small class="text-muted text-uppercase" style="font-size: 0.7rem; font-weight: 700;">Mins</small>
      </div>
      <div class="countdown-box">
        <h3 id="timer-seconds" class="mb-0 text-primary fw-bold" style="font-size: 2rem;">00</h3>
        <small class="text-muted text-uppercase" style="font-size: 0.7rem; font-weight: 700;">Secs</small>
      </div>
    </div>

    <!-- Email Subscription Input -->
    <form class="needs-validation-premium" novalidate>
      <div class="form-group-premium text-start">
        <label for="sub-email" class="form-label-premium text-center d-block mb-3">Subscribe for Early Access Alerts</label>
        <input type="email" id="sub-email" class="form-control-premium text-center" placeholder="john@company.com" required>
      </div>

      <button type="submit" class="btn btn-premium btn-premium-primary w-100 mt-2">Join Waitlist</button>
    </form>

  </main>

  <!-- Live Countdown Timer logic -->
  <script>
    // Target date: 30 days from now
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 30);

    function updateCountdown() {
      const now = new Date().getTime();
      const difference = targetDate.getTime() - now;

      if (difference < 0) {
        clearInterval(timerInterval);
        return;
      }

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      document.getElementById('timer-days').innerText = String(days).padStart(2, '0');
      document.getElementById('timer-hours').innerText = String(hours).padStart(2, '0');
      document.getElementById('timer-minutes').innerText = String(minutes).padStart(2, '0');
      document.getElementById('timer-seconds').innerText = String(seconds).padStart(2, '0');
    }

    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown(); // Run immediately
  </script>

  <!-- Script references -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
